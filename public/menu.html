<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — COCKPIT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .domain-section { margin-bottom: 40px; }
  .domain-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .domain-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--navy); display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .domain-name {
    font-family: var(--font-display); font-weight: 700;
    font-size: 17px; color: var(--ink); line-height: 1.2;
  }
  .domain-desc { font-size: 12.5px; color: var(--ink-2); margin-top: 3px; line-height: 1.5; }
  .empty-state {
    text-align: center; padding: 64px 24px; color: var(--ink-2);
    font-size: 14px;
  }
  .loading { color: var(--ink-2); font-size: 14px; padding: 32px 0; }
</style>
</head>
<body>

<header class="menu-top">
  <div class="menu-top-inner">
    <div>
      <div class="brand-title-sm">COCKPIT</div>
      <div class="welcome-text">Selamat datang, <span id="whoami">…</span></div>
    </div>
    <button id="logoutBtn" class="btn-logout">Keluar</button>
  </div>
</header>

<main class="menu-grid-wrap">
  <div id="domainsContainer">
    <p class="loading">Memuat data…</p>
  </div>
</main>

<script>
const MODULE_ICONS = {
  'mdp':          '📊',
  'ruptl':        '🏗️',
  'pelanggan':    '👥',
  'olap-tagihan': '🧾',
  'pencurian':    '⚠️',
};
const MODULE_DESC = {
  'mdp':          'Data equity &amp; energi Jawa Barat untuk riset MDP renewable energy',
  'ruptl':        'Rencana pengembangan sistem tenaga listrik — 34 provinsi, RE Base &amp; ARED',
  'pelanggan':    'Master data pelanggan — akses terbatas',
  'olap-tagihan': 'Ringkasan &amp; analisis tagihan listrik',
  'pencurian':    'Akses terbatas — role tertentu saja',
};
const DOMAIN_ICONS = {
  'energi-jabar': '⚡',
};

async function init() {
  const meRes = await fetch('/api/auth/me');
  if (!meRes.ok) { window.location.href = '/'; return; }
  const user = await meRes.json();
  document.getElementById('whoami').textContent = `${user.username} (${user.role})`;

  const domRes = await fetch('/api/domains');
  if (!domRes.ok) {
    document.getElementById('domainsContainer').innerHTML =
      '<p class="empty-state">Gagal memuat data. Coba muat ulang halaman.</p>';
    return;
  }
  const domainList = await domRes.json();
  render(domainList, user.role);
}

function render(domainList, role) {
  const container = document.getElementById('domainsContainer');
  container.innerHTML = '';

  if (!domainList.length) {
    container.innerHTML = '<p class="empty-state">Belum ada domain yang bisa diakses. Hubungi admin.</p>';
    return;
  }

  for (const domain of domainList) {
    const section = document.createElement('div');
    section.className = 'domain-section';

    const icon = DOMAIN_ICONS[domain.slug] || '🗂️';
    const headerEl = document.createElement('div');
    headerEl.className = 'domain-header';
    headerEl.innerHTML = `
      <div class="domain-icon">${icon}</div>
      <div>
        <div class="domain-name">${domain.nama}</div>
        ${domain.deskripsi ? `<div class="domain-desc">${domain.deskripsi}</div>` : ''}
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'menu-grid';

    for (const mod of domain.modules) {
      const isAktif = mod.status === 'aktif';
      const card = document.createElement(isAktif ? 'a' : 'div');
      card.className = 'module-card' + (isAktif ? ' ready' : '');
      if (isAktif) {
        card.href = mod.routePath;
      } else {
        card.style.cursor = 'default';
      }

      const statusLabel = mod.status === 'aktif' ? 'Aktif' : 'Segera';
      const statusClass = mod.status === 'aktif' ? '' : ' pending';
      const desc = MODULE_DESC[mod.slug] || mod.nama;
      const modIcon = MODULE_ICONS[mod.slug] || '📁';

      card.innerHTML = `
        <div class="module-icon">${modIcon}</div>
        <div class="module-name">${mod.nama}</div>
        <div class="module-desc">${desc}</div>
        <div class="module-status${statusClass}">${statusLabel}</div>
      `;
      grid.appendChild(card);
    }

    if (role === 'admin') {
      const emptyCard = document.createElement('div');
      emptyCard.className = 'module-card module-card-empty';
      emptyCard.innerHTML = `
        <div class="module-icon">➕</div>
        <div class="module-name">Modul Berikutnya</div>
        <div class="module-desc">Slot untuk data baru yang ditambahkan nanti</div>
      `;
      grid.appendChild(emptyCard);
    }

    section.appendChild(headerEl);
    section.appendChild(grid);
    container.appendChild(section);
  }
}

init();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/';
});
</script>
</body>
</html>
