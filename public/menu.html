<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — COCKPIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0D1117;--navy-2:#161B22;--navy-3:#1C2128;
    --orange:#FF4D00;--yellow:#FFD600;
    --green:#2ECC71;--red:#E74C3C;
    --border:rgba(255,255,255,.07);
    --border-2:rgba(255,255,255,.12);
    --ink:#E6EDF3;--ink-2:rgba(230,237,243,.5);--ink-3:rgba(230,237,243,.25);
  }
  html,body{min-height:100%;background:var(--navy);color:var(--ink);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

  /* ── TOPBAR ── */
  .topbar{
    position:sticky;top:0;z-index:100;
    background:rgba(13,17,23,.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;
    height:56px;
  }
  .topbar-left{display:flex;align-items:center;gap:20px;}
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand-mark{
    width:32px;height:32px;border-radius:8px;
    background:var(--orange);border:2px solid #111118;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;box-shadow:2px 2px 0 #111118;color:#fff;
  }
  .topbar-brand-name{font-family:'Fraunces',serif;font-weight:900;font-size:.95rem;color:var(--ink);letter-spacing:.04em;}
  .topbar-version{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--ink-3);letter-spacing:.08em;}
  .topbar-status{
    display:flex;align-items:center;gap:6px;
    font-family:'DM Mono',monospace;font-size:.6rem;
    color:var(--ink-2);
    padding:5px 10px;border-radius:20px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
  }
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  .topbar-right{display:flex;align-items:center;gap:12px;}
  .topbar-user{
    font-family:'DM Mono',monospace;font-size:.65rem;
    color:var(--ink-2);display:flex;align-items:center;gap:8px;
  }
  .user-badge{
    background:rgba(255,77,0,.15);border:1px solid rgba(255,77,0,.3);
    color:var(--orange);padding:3px 8px;border-radius:12px;font-size:.55rem;
    font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  }
  .btn-logout{
    background:transparent;border:1px solid var(--border-2);
    color:var(--ink-2);padding:7px 14px;border-radius:8px;
    font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;
    cursor:pointer;transition:all .15s;
  }
  .btn-logout:hover{background:rgba(255,77,0,.1);border-color:var(--orange);color:var(--orange);}

  /* ── MAIN ── */
  .main{max-width:1200px;margin:0 auto;padding:32px 28px 80px;}

  /* ── DOMAIN PANEL ── */
  .domain-panel{
    border:1px solid var(--border-2);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:12px;
  }
  .domain-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;
    background:var(--navy-2);
    border-bottom:1px solid var(--border);
  }
  .domain-header-left{display:flex;align-items:center;gap:14px;}
  .domain-icon{
    width:42px;height:42px;border-radius:10px;
    background:var(--orange);border:2px solid #111118;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:3px 3px 0 #111118;flex-shrink:0;color:#fff;
  }
  .domain-name{font-family:'Fraunces',serif;font-weight:900;font-size:1.05rem;color:var(--ink);}
  .domain-desc{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--ink-3);margin-top:3px;letter-spacing:.03em;}
  .domain-meta{display:flex;align-items:center;gap:8px;}
  .domain-tag{
    font-family:'DM Mono',monospace;font-size:.55rem;
    padding:4px 9px;border-radius:12px;
    border:1px solid var(--border-2);color:var(--ink-3);
  }
  .domain-tag.active{border-color:rgba(46,204,113,.3);color:var(--green);background:rgba(46,204,113,.07);}

  /* ── SECTIONS ── */
  .sections-wrap{padding:20px 24px;display:flex;flex-direction:column;gap:28px;}

  .section-block{}
  .section-label{
    display:flex;align-items:center;gap:12px;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid var(--border);
  }
  .section-num{
    font-family:'DM Mono',monospace;font-size:.6rem;
    color:var(--yellow);background:rgba(255,214,0,.08);
    border:1px solid rgba(255,214,0,.2);
    padding:3px 8px;border-radius:8px;
    letter-spacing:.06em;flex-shrink:0;
  }
  .section-title{
    font-family:'DM Mono',monospace;font-size:.72rem;
    color:var(--ink-2);letter-spacing:.08em;text-transform:uppercase;font-weight:500;
  }
  .section-line{flex:1;height:1px;background:linear-gradient(to right,var(--border-2),transparent);}
  .section-count{
    font-family:'DM Mono',monospace;font-size:.55rem;color:var(--ink-3);
  }

  /* ── MODULE GRID ── */
  .module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

  /* ── MODULE CARD ── */
  .module-card{
    background:var(--navy-3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 20px 16px;
    text-decoration:none;color:var(--ink);
    display:block;position:relative;overflow:hidden;
    transition:all .15s ease;
  }
  .module-card::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,77,0,.04) 0%,transparent 60%);
    opacity:0;transition:opacity .15s;
  }
  .module-card.aktif{border-left:3px solid var(--orange);}
  .module-card.aktif:hover{
    border-color:var(--orange);
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(255,77,0,.12),0 0 0 1px rgba(255,77,0,.2);
  }
  .module-card.aktif:hover::before{opacity:1;}
  .module-card.draft{
    opacity:.55;border-style:dashed;cursor:default;
    border-left:3px dashed rgba(255,255,255,.12);
  }

  .module-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .module-icon{font-size:20px;line-height:1;color:var(--ink-2);width:28px;}
  .module-icon.aktif{color:var(--orange);}
  .module-icon.draft{color:var(--ink-3);}
  .module-status-pill{
    font-family:'DM Mono',monospace;font-size:.52rem;font-weight:500;
    padding:3px 8px;border-radius:10px;
    letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;
  }
  .module-status-pill.aktif{
    background:rgba(46,204,113,.1);color:var(--green);
    border:1px solid rgba(46,204,113,.25);
  }
  .module-status-pill.draft{
    background:rgba(255,255,255,.04);color:var(--ink-3);
    border:1px solid var(--border);
  }

  .module-name{
    font-family:'DM Sans',sans-serif;font-size:.92rem;
    font-weight:600;color:var(--ink);margin-bottom:6px;line-height:1.3;
  }
  .module-desc{
    font-family:'DM Mono',monospace;font-size:.6rem;
    color:var(--ink-3);line-height:1.6;
  }
  .module-card-foot{
    margin-top:14px;padding-top:12px;
    border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .module-slug{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--ink-3);}
  .module-arrow{font-size:.75rem;color:var(--orange);opacity:0;transition:opacity .15s;}
  .module-card.aktif:hover .module-arrow{opacity:1;}

  /* ── EMPTY SECTION ── */
  .section-empty{
    border:1px dashed var(--border);border-radius:10px;
    padding:28px;text-align:center;
    font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ink-3);
  }
  .section-empty .label{margin-top:8px;font-size:.58rem;}

  /* ── ADMIN ADD CARD ── */
  .module-card-add{
    background:transparent;border:1px dashed var(--border);
    border-radius:12px;padding:18px 20px;
    display:flex;align-items:center;gap:10px;
    color:var(--ink-3);cursor:default;
    font-family:'DM Mono',monospace;font-size:.65rem;
  }

  /* ── LOADING / EMPTY ── */
  .loading-state{
    text-align:center;padding:64px 24px;
    font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink-3);
  }
  .spinner{
    width:20px;height:20px;border:2px solid var(--border-2);
    border-top-color:var(--orange);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 12px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── RESPONSIVE ── */
  @media(max-width:700px){
    .topbar{padding:0 16px;}
    .topbar-status{display:none;}
    .main{padding:20px 16px 60px;}
    .sections-wrap{padding:16px;}
    .domain-header{padding:14px 16px;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">
      <div class="topbar-brand-mark"><i class="fa-solid fa-bolt"></i></div>
      <div>
        <div class="topbar-brand-name">COCKPIT</div>
        <div class="topbar-version">v0.1.0 · Pusat Data Riset Pribadi</div>
      </div>
    </div>
    <div class="topbar-status">
      <div class="status-dot"></div>
      <span>SISTEM ONLINE</span>
      <span id="clockEl" style="color:rgba(255,214,0,.5)">--:--</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-user">
      <span id="whoami">…</span>
      <span class="user-badge" id="roleTag">—</span>
    </div>
    <button id="logoutBtn" class="btn-logout">Keluar →</button>
  </div>
</header>

<main class="main">
  <div id="domainsContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      Memuat data sistem…
    </div>
  </div>
</main>

<script>
const MODULE_ICONS = {
  'mdp':          '<i class="fa-solid fa-chart-column"></i>',
  'ruptl':        '<i class="fa-solid fa-industry"></i>',
  'pelanggan':    '<i class="fa-solid fa-users"></i>',
  'olap-tagihan': '<i class="fa-solid fa-file-invoice"></i>',
  'pencurian':    '<i class="fa-solid fa-triangle-exclamation"></i>',
};
const MODULE_DESC = {
  'mdp':          'Bauran energi primer Jawa Barat — RE vs NRE, RKPD 2026, RUPTL 2025-2034, gangguan PLN, kemiskinan',
  'ruptl':        'Rencana pengembangan sistem tenaga listrik nasional — 34 provinsi, RE Base & ARED',
  'pelanggan':    'Master data pelanggan PLN Jawa Barat — akses terbatas, data PII terenkripsi',
  'olap-tagihan': 'Ringkasan & analisis tagihan listrik — summary table + tren',
  'pencurian':    'Data gangguan & dugaan pencurian tenaga listrik — role tertentu saja',
};

// Mapping slug → section (1/2/3)
const SECTION_MAP = {
  'mdp':          1,
  'ruptl':        1,
  'pelanggan':    3,
  'olap-tagihan': 3,
  'pencurian':    3,
};
const SECTIONS = [
  { id: 1, num: '01', label: 'Pembangkitan, Transisi Energi & Energi Hijau' },
  { id: 2, num: '02', label: 'Transmisi' },
  { id: 3, num: '03', label: 'Distribusi Tenaga Listrik' },
];
const DOMAIN_ICONS = { 'energi-jabar': '<i class="fa-solid fa-bolt-lightning"></i>' };

// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const el = document.getElementById('clockEl');
  if (el) el.textContent = `${h}:${m} WIB`;
}
updateClock();
setInterval(updateClock, 10000);

async function init() {
  const meRes = await fetch('/api/auth/me');
  if (!meRes.ok) { window.location.href = '/'; return; }
  const user = await meRes.json();
  document.getElementById('whoami').textContent = user.username;
  document.getElementById('roleTag').textContent = user.role.toUpperCase();

  const domRes = await fetch('/api/domains');
  if (!domRes.ok) {
    document.getElementById('domainsContainer').innerHTML =
      '<div class="loading-state">Gagal memuat data. Coba muat ulang halaman.</div>';
    return;
  }
  const domainList = await domRes.json();
  render(domainList, user.role);
}

function render(domainList, role) {
  const container = document.getElementById('domainsContainer');
  container.innerHTML = '';

  if (!domainList.length) {
    container.innerHTML = '<div class="loading-state">Belum ada domain yang bisa diakses. Hubungi admin.</div>';
    return;
  }

  for (const domain of domainList) {
    const icon = DOMAIN_ICONS[domain.slug] || '🗂️';
    const activeCount = domain.modules.filter(m => m.status === 'aktif').length;

    const panel = document.createElement('div');
    panel.className = 'domain-panel';
    panel.innerHTML = `
      <div class="domain-header">
        <div class="domain-header-left">
          <div class="domain-icon">${icon}</div>
          <div>
            <div class="domain-name">${domain.nama}</div>
            <div class="domain-desc">${domain.deskripsi || ''}</div>
          </div>
        </div>
        <div class="domain-meta">
          <span class="domain-tag active">${activeCount} AKTIF</span>
          <span class="domain-tag">${domain.modules.length} MODUL</span>
        </div>
      </div>
      <div class="sections-wrap" id="sections-${domain.slug}"></div>
    `;
    container.appendChild(panel);

    const sectionsWrap = panel.querySelector(`#sections-${domain.slug}`);

    for (const sec of SECTIONS) {
      const mods = domain.modules.filter(m => (SECTION_MAP[m.slug] || 1) === sec.id);
      const secEl = document.createElement('div');
      secEl.className = 'section-block';

      const modCount = mods.length;
      secEl.innerHTML = `
        <div class="section-label">
          <span class="section-num">${sec.num}</span>
          <span class="section-title">${sec.label}</span>
          <div class="section-line"></div>
          <span class="section-count">${modCount ? modCount + ' modul' : 'belum ada'}</span>
        </div>
      `;

      if (!mods.length) {
        secEl.innerHTML += `
          <div class="section-empty">
            <i class="fa-regular fa-circle-dot" style="font-size:1.2rem;opacity:.2;margin-bottom:8px;display:block;"></i>
            <div class="label">Modul untuk seksi ini belum tersedia</div>
          </div>`;
      } else {
        const grid = document.createElement('div');
        grid.className = 'module-grid';

        for (const mod of mods) {
          const isAktif = mod.status === 'aktif';
          const card = document.createElement(isAktif ? 'a' : 'div');
          card.className = `module-card ${mod.status}`;
          if (isAktif) {
            card.href = mod.routePath;
          }
          const desc = MODULE_DESC[mod.slug] || mod.nama;
          const ico  = MODULE_ICONS[mod.slug] || '<i class="fa-solid fa-folder-open"></i>';
          card.innerHTML = `
            <div class="module-card-top">
              <div class="module-icon ${mod.status}">${ico}</div>
              <span class="module-status-pill ${mod.status}">${mod.status === 'aktif' ? 'AKTIF' : 'SEGERA'}</span>
            </div>
            <div class="module-name">${mod.nama}</div>
            <div class="module-desc">${desc}</div>
            <div class="module-card-foot">
              <span class="module-slug">${domain.slug}/${mod.slug}</span>
              <span class="module-arrow"><i class="fa-solid fa-arrow-right"></i></span>
            </div>
          `;
          grid.appendChild(card);
        }

        if (role === 'admin') {
          const addCard = document.createElement('div');
          addCard.className = 'module-card-add';
          addCard.innerHTML = `<i class="fa-solid fa-plus" style="opacity:.3"></i><span>Modul berikutnya</span>`;
          grid.appendChild(addCard);
        }

        secEl.appendChild(grid);
      }

      sectionsWrap.appendChild(secEl);
    }
  }
}

init();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/';
});
</script>
</body>
</html>
