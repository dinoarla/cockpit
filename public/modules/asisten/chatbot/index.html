<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asisten AI — COCKPIT</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1117;
  --cream:#FFFBF0;
  --white:#FFFFFF;
  --orange:#FF4D00;
  --yellow:#FFD600;
  --green:#2ECC71;
  --red:#E74C3C;
  --ink:#111118;
  --ink-2:#555560;
  --ink-3:#999;
  --border:2px solid #111118;
  --border-light:1px solid rgba(17,17,24,.12);
  --shadow:3px 3px 0 #111118;
  --shadow-sm:2px 2px 0 #111118;
  --topbar-ink:#E6EDF3;
  --topbar-border:rgba(255,255,255,.08);
}
html,body{height:100%;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:100;
  background:#0D1117;
  border-bottom:1px solid var(--topbar-border);
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:52px;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:14px;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:rgba(230,237,243,.6);font-size:.8rem;font-weight:500;
  text-decoration:none;padding:5px 10px;border-radius:7px;
  border:1px solid rgba(255,255,255,.08);transition:all .15s;
}
.back-btn:hover{background:rgba(255,255,255,.06);color:var(--topbar-ink);}
.topbar-brand{display:flex;align-items:center;gap:8px;}
.brand-mark{
  width:28px;height:28px;border-radius:7px;
  background:var(--orange);border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;font-weight:800;
}
.brand-name{font-weight:800;font-size:.9rem;color:var(--topbar-ink);}
.brand-badge{
  font-family:'DM Mono',monospace;font-size:.6rem;
  background:rgba(255,77,0,.2);color:#FF7A40;
  padding:2px 7px;border-radius:20px;border:1px solid rgba(255,77,0,.3);
}

/* LAYOUT */
.layout{display:flex;flex-direction:column;height:calc(100vh - 52px);}

/* CHAT CONTAINER */
.chat-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.chat-wrap::-webkit-scrollbar{width:4px;}
.chat-wrap::-webkit-scrollbar-thumb{background:rgba(17,17,24,.15);border-radius:4px;}

/* MESSAGES */
.msg{display:flex;gap:10px;max-width:820px;width:100%;margin:0 auto;}
.msg.user{flex-direction:row-reverse;}
.avatar{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;border:2px solid var(--ink);
}
.avatar.ai{background:var(--orange);color:#fff;}
.avatar.user{background:var(--navy);color:#fff;}
.bubble{
  background:var(--white);border:var(--border);border-radius:12px;
  padding:12px 16px;box-shadow:var(--shadow-sm);
  font-size:.875rem;line-height:1.6;
  max-width:calc(100% - 48px);
}
.msg.user .bubble{background:var(--navy);color:var(--topbar-ink);border-color:var(--navy);}

/* SQL TOGGLE */
.sql-toggle{
  margin-top:8px;padding:6px 10px;
  background:rgba(17,17,24,.04);border:1px solid var(--border-light);
  border-radius:7px;cursor:pointer;font-size:.75rem;
  color:var(--ink-2);display:flex;align-items:center;gap:6px;
  width:fit-content;user-select:none;
}
.sql-toggle:hover{background:rgba(17,17,24,.08);}
.sql-block{
  display:none;margin-top:6px;
  background:#0D1117;color:#7EE787;
  font-family:'DM Mono',monospace;font-size:.75rem;
  padding:10px 12px;border-radius:8px;overflow-x:auto;
  white-space:pre;border:2px solid #111118;
}
.sql-block.visible{display:block;}

/* DATA TABLE */
.data-table-wrap{margin-top:10px;overflow-x:auto;max-height:280px;overflow-y:auto;border:var(--border);border-radius:8px;}
.data-table{width:100%;border-collapse:collapse;font-size:.75rem;font-family:'DM Mono',monospace;}
.data-table th{background:#0D1117;color:var(--topbar-ink);padding:6px 10px;text-align:left;white-space:nowrap;position:sticky;top:0;}
.data-table td{padding:5px 10px;border-bottom:1px solid var(--border-light);white-space:nowrap;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:nth-child(even) td{background:rgba(17,17,24,.03);}

/* THINKING */
.thinking{display:flex;gap:5px;align-items:center;padding:4px 0;}
.thinking span{
  width:7px;height:7px;border-radius:50%;
  background:var(--ink-3);animation:bounce .9s infinite;
}
.thinking span:nth-child(2){animation-delay:.15s;}
.thinking span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* EMPTY STATE */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--ink-2);text-align:center;padding:24px;
}
.empty-icon{font-size:3rem;opacity:.3;}
.empty h2{font-size:1.1rem;font-weight:700;color:var(--ink);}
.empty p{font-size:.85rem;max-width:360px;line-height:1.6;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
.sug-btn{
  padding:7px 13px;border:var(--border);border-radius:20px;
  background:var(--white);font-size:.8rem;cursor:pointer;
  transition:all .15s;box-shadow:var(--shadow-sm);font-family:'DM Sans',sans-serif;
}
.sug-btn:hover{background:var(--ink);color:#fff;}

/* INPUT AREA */
.input-area{
  border-top:var(--border);background:var(--white);
  padding:12px 16px;
}
.input-row{
  display:flex;gap:10px;max-width:820px;margin:0 auto;
  border:var(--border);border-radius:12px;overflow:hidden;
  box-shadow:var(--shadow-sm);background:var(--white);
}
textarea{
  flex:1;resize:none;border:none;outline:none;padding:12px 14px;
  font-family:'DM Sans',sans-serif;font-size:.875rem;line-height:1.5;
  background:transparent;color:var(--ink);min-height:48px;max-height:140px;
}
textarea::placeholder{color:var(--ink-3);}
.send-btn{
  padding:0 16px;background:var(--orange);color:#fff;
  border:none;border-left:var(--border);cursor:pointer;
  font-weight:700;font-size:.85rem;transition:background .15s;
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.send-btn:hover{background:#e04500;}
.send-btn:disabled{background:var(--ink-3);cursor:not-allowed;}
.input-hint{text-align:center;font-size:.7rem;color:var(--ink-3);margin-top:6px;max-width:820px;margin-left:auto;margin-right:auto;}

/* ERROR */
.error-bubble{
  background:#FFF0EE;border:2px solid var(--red);
  border-radius:10px;padding:10px 14px;font-size:.85rem;color:var(--red);
  max-width:820px;margin:0 auto;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/menu.html" class="back-btn">← Menu</a>
    <div class="topbar-brand">
      <div class="brand-mark">C</div>
      <span class="brand-name">COCKPIT</span>
    </div>
  </div>
  <span class="brand-badge">Asisten AI · Gemini</span>
</div>

<div class="layout">
  <div class="chat-wrap" id="chatWrap">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🤖</div>
      <h2>Asisten Data COCKPIT</h2>
      <p>Tanyakan apa saja tentang data di COCKPIT. Saya akan ambil datanya langsung dari database.</p>
      <div class="suggestions">
        <button class="sug-btn" onclick="sendSuggestion(this)">Total kWh Jawa Barat tiap bulan 2026</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">UP3 mana yang paling banyak pelanggannya?</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">Berapa rata-rata kWh per pelanggan Maret 2026?</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">Tren total kWh dari Januari sampai Juli 2026</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" placeholder="Tanya data COCKPIT... (Enter kirim, Shift+Enter baris baru)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <span>Kirim</span>
        <span>↑</span>
      </button>
    </div>
    <div class="input-hint">Data baca meter · OLAP tagihan · Statistik PLN · Kependudukan BPS</div>
  </div>
</div>

<script>
const chatWrap = document.getElementById('chatWrap');
const emptyState = document.getElementById('emptyState');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

// Riwayat percakapan (teks saja)
let history = [];
let isLoading = false;

// Auto-resize textarea
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
});

// Enter = kirim, Shift+Enter = baris baru
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendSuggestion(btn) {
  msgInput.value = btn.textContent;
  sendMessage();
}

function scrollBottom() {
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function addUserBubble(text) {
  emptyState.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="avatar user">D</div>
    <div class="bubble">${escHtml(text)}</div>
  `;
  chatWrap.appendChild(msg);
  scrollBottom();
}

function addThinking() {
  emptyState.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'thinkingMsg';
  msg.innerHTML = `
    <div class="avatar ai">AI</div>
    <div class="bubble">
      <div class="thinking"><span></span><span></span><span></span></div>
    </div>
  `;
  chatWrap.appendChild(msg);
  scrollBottom();
  return msg;
}

function removeThinking() {
  document.getElementById('thinkingMsg')?.remove();
}

function addAiBubble(answer, usedSql, rowCount) {
  const msg = document.createElement('div');
  msg.className = 'msg ai';

  const sqlHtml = usedSql ? `
    <div class="sql-toggle" onclick="toggleSql(this)">
      <span>🔍</span> Lihat SQL (${rowCount} baris)
    </div>
    <div class="sql-block">${escHtml(usedSql)}</div>
  ` : '';

  msg.innerHTML = `
    <div class="avatar ai">AI</div>
    <div class="bubble">
      ${formatAnswer(answer)}
      ${sqlHtml}
    </div>
  `;
  chatWrap.appendChild(msg);
  scrollBottom();
}

function addErrorBubble(msg) {
  const el = document.createElement('div');
  el.className = 'error-bubble';
  el.textContent = '⚠ ' + msg;
  chatWrap.appendChild(el);
  scrollBottom();
}

function toggleSql(btn) {
  const block = btn.nextElementSibling;
  block.classList.toggle('visible');
  btn.querySelector('span:first-child').textContent = block.classList.contains('visible') ? '🔼' : '🔍';
}

function formatAnswer(text) {
  // Format sederhana: bold, newline, angka besar
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function sendMessage() {
  if (isLoading) return;
  const text = msgInput.value.trim();
  if (!text) return;

  isLoading = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addUserBubble(text);
  const thinkEl = addThinking();

  try {
    const res = await fetch('/api/chatbot/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });

    removeThinking();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Terjadi kesalahan server' }));
      addErrorBubble(err.error || 'Terjadi kesalahan');
    } else {
      const data = await res.json();
      if (data.error) {
        addErrorBubble(data.error);
      } else {
        addAiBubble(data.answer, data.sql, data.rowCount);
        // Simpan ke history untuk konteks multi-turn
        history.push({ role: 'user', text });
        history.push({ role: 'model', text: data.answer });
        // Batasi history 20 pesan terakhir
        if (history.length > 20) history = history.slice(-20);
      }
    }
  } catch (err) {
    removeThinking();
    addErrorBubble('Gagal terhubung ke server. Periksa koneksi internet.');
  }

  isLoading = false;
  sendBtn.disabled = false;
  msgInput.focus();
}
</script>
</body>
</html>
